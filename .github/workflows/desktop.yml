name: Desktop

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "desktop/**"
      - "cmd/**"
      - "internal/**"
      - "scripts/build-desktop-sidecar.mjs"
      - "package.json"
      - "go.mod"
      - "go.sum"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            sidecar: linux
          - os: windows-latest
            sidecar: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - run: npm install
      - run: npm run desktop:build:sidecar:${{ matrix.sidecar }}
      - run: npm --prefix desktop run build
      - run: cargo check
        working-directory: desktop/src-tauri
      - name: Upload sidecar
        uses: actions/upload-artifact@v4
        with:
          name: som-sidecar-${{ matrix.sidecar }}
          path: desktop/src-tauri/binaries/*
