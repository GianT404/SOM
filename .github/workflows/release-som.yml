name: Release SOM TUI

# Push a tag like "v0.5.0" to trigger this — `som --upgrade` looks for
# assets named exactly `som-<GOOS>-<GOARCH>[.exe]` in the latest release,
# so keep these names in sync with cmd/som/update.go if you ever change them.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build Linux amd64
        run: |
          GOOS=linux GOARCH=amd64 go build \
            -ldflags "-X main.Version=${{ github.ref_name }}" \
            -o som-linux-amd64 ./cmd/som

      - name: Build Windows amd64
        run: |
          GOOS=windows GOARCH=amd64 go build \
            -ldflags "-X main.Version=${{ github.ref_name }}" \
            -o som-windows-amd64.exe ./cmd/som

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            som-linux-amd64
            som-windows-amd64.exe
          generate_release_notes: true